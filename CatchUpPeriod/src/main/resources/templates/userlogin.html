<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuario logueado</title>
</head>
<body>
<h2>Datos del Usuario</h2>

<div style="border:1px solid #ccc; padding:20px; width:300px; border-radius:10px;">

    <p><b>Nombre:</b> <span th:text="${user.name}"></span></p>

    <p><b>Apellido:</b> <span th:text="${user.surname}"></span></p>

    <p><b>Email:</b> <span th:text="${user.email}"></span></p>

    <p><b>Teléfono:</b> <span th:text="${user.phone}"></span></p>

    <p><b>Fecha nacimiento:</b> <span th:text="${user.birthdate}"></span></p>

</div>
</body>
</html>
