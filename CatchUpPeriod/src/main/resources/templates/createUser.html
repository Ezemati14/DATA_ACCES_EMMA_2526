<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Crear usuario</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
  <h1>Crear nuevo usuario</h1>

  <form class="login-box" th:action="@{/library/save}" method="post" th:object="${user}">

    <label>Código:</label>
    <input type="text" th:field="*{code}" /><br>

    <label>Nombre:</label>
    <input type="text" th:field="*{name}" /><br>

    <label>Apellido:</label>
    <input type="text" th:field="*{surname}" /><br>

    <label>Fecha nacimiento:</label>
    <input type="date" th:field="*{birthdate}" /><br>

    <label>Email:</label>
    <input type="text" th:field="*{email}" /><br>

    <label>Teléfono:</label>
    <input type="text" th:field="*{phone}" /><br>

    <button type="submit">Guardar</button>

  </form>

  <p th:if="${success}" th:text="${success}" style="color:green;"></p>
  <p th:if="${error}" th:text="${error}" style="color:red;"></p>

  <a href="/library/lending">Ir a pagina de crear prestamo</a><br>
  <a href="/library/returning">Ir a pagina de devolver un libro</a><br>
  <a href="/library/active-lendings">Ver préstamos activos</a><br>
  <a href="/library/cancelReservation">CANCELAR RESERVA</a><br>
  <a href="/library/users">Lista Usuario</a><br>
  <a href="/logout">Cerra sesion</a>

</div>

</body>
</html>
